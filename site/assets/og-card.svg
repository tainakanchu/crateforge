<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bcc6cc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.27" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#6ca1b5" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#6ca1b5" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#6ca1b5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191c20"/>
      <stop offset="1" stop-color="#111417"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0e1113"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="3" y="3" width="1194" height="624" rx="22" fill="none" stroke="#22272b" stroke-width="2"/>
  <!-- bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="#6ca1b5"/>

  <!-- ===== brand mark (app-icon style tile + nested diamonds) ===== -->
  <g>
    <rect x="96" y="161" width="308" height="308" rx="66" fill="url(#tile)" stroke="#2c3338" stroke-width="2"/>
    <g transform="rotate(45 250 315)">
      <rect x="172" y="237" width="156" height="156" rx="28" fill="none" stroke="#e8edf0" stroke-width="9"/>
      <rect x="201" y="266" width="98"  height="98"  rx="20" fill="none" stroke="#e8edf0" stroke-width="8"/>
      <rect x="226" y="291" width="48"  height="48"  rx="12" fill="#6ca1b5"/>
    </g>
  </g>

  <!-- ===== text block ===== -->
  <text x="472" y="210" font-family="Noto Sans CJK JP, DejaVu Sans, sans-serif" font-size="22" font-weight="700"
        letter-spacing="4" fill="#6ca1b5">MUSIC LIBRARY · DJ TOOLKIT</text>

  <text x="468" y="312" font-family="Noto Sans CJK JP, DejaVu Sans, sans-serif" font-size="108" font-weight="900"
        fill="url(#word)">Crateforge</text>

  <text x="474" y="364" font-family="Noto Sans CJK JP, DejaVu Sans, sans-serif" font-size="33" font-weight="500"
        fill="#aab0b6">爆速 iTunes 風の音楽管理 ＆ DJ 選曲アプリ</text>

  <rect x="474" y="388" width="72" height="5" rx="2.5" fill="#6ca1b5"/>

  <text x="474" y="446" font-family="Noto Sans CJK JP, DejaVu Sans, sans-serif" font-size="27" font-weight="600"
        fill="#9da2a8">Windows · macOS · Linux</text>

  <text x="474" y="492" font-family="Noto Sans CJK JP, DejaVu Sans, sans-serif" font-size="24" font-weight="500"
        fill="#737a80">Tauri 2 · React 19 · Rust · SQLite</text>

  <text x="474" y="556" font-family="Noto Sans CJK JP, DejaVu Sans, sans-serif" font-size="22" font-weight="600"
        fill="#5d646a">github.com/tainakanchu/crateforge</text>
</svg>
