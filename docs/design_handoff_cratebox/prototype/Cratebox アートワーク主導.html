<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cratebox — アートワーク主導</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e10; }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="dirB2.jsx"></script>
<script type="text/babel" src="dirB3.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <DesignCanvas>
        <DCSection id="crate" title="Cratebox · アートワーク主導" subtitle="中華圏トラックをカバーで識別。曲のメタデータのみで構成（読み併記なし）。List は大ジャケ、Covers はブラウズ用ギャラリー。どちらも右の Staging Crate に＋で投入。">
          <DCArtboard id="list" label="List — 大ジャケ + メタデータ" width={BB_W} height={BB_H}><CrateboxArt mode="list" /></DCArtboard>
          <DCArtboard id="covers" label="Covers — ジャケ一覧でブラウズ" width={BB_W} height={BB_H}><CrateboxArt mode="covers" /></DCArtboard>
        </DCSection>
        <DCSection id="columns" title="カスタム列 （動く ColumnPicker）" subtitle="「Columns」で表示項目のオン/オフ・ドラッグ並べ替え。行高はスライダーで調整、アートワークはなし/豆/小。実際に操作できます。">
          <DCArtboard id="live" label="List — 豆ジャケ + 行高調整（クリックでお試し）" width={B3_W} height={B3_H}><CrateboxLive /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
